<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="initial-scale=1, user-scalable=no, maximum-scale=1, width=device-width">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="stylesheet" href="css/leaflet.css">
    <link rel="stylesheet" href="css/L.Control.Layers.Tree.css">
    <link rel="stylesheet" href="css/qgis2web.css">
    <link rel="stylesheet" href="css/fontawesome-all.min.css">
    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
        }
        #map {
            position: absolute;
            top: 60px;
            bottom: 30px;
            left: 0;
            right: 0;
        }
    </style>
    <title>Geobivida – Mapa Interativo</title>
</head>
<body>
    <!-- Cabeçalho com logotipo -->
    <header style="background-color:#f0f0f0; padding: 10px 20px; border-bottom: 1px solid #ccc;
        position: fixed; top: 0; left: 0; right: 0; z-index: 9999; display: flex; align-items: center;">
        <img src="images/logo.png" alt="Logo GeoBivida" style="height: 40px; margin-right: 15px;">
        <h1 style="margin: 0; font-size: 22px; color: #333; font-family: Arial, sans-serif;">GEBIVIDA – Mapa Interativo</h1>
    </header>

    <!-- Div do mapa -->
    <div id="map"></div>

    <!-- Rodapé -->
    <footer style="position: fixed; bottom: 0; left: 0; right: 0; height: 30px; background-color: #f0f0f0;
        border-top: 1px solid #ccc; text-align: center; font-size: 12px; color: #555; line-height: 30px;
        z-index: 9999;">
        © 2025 Geobivida – Projeto de WebGIS de Biodiversidade
    </footer>

    <!-- Scripts do QGIS2WEB -->
    <script src="js/qgis2web_expressions.js"></script>
    <script src="js/leaflet.js"></script>
    <script src="js/L.Control.Layers.Tree.min.js"></script>
    <script src="js/leaflet.rotatedMarker.js"></script>
    <script src="js/leaflet.pattern.js"></script>
    <script src="js/leaflet-hash.js"></script>
    <script src="js/Autolinker.min.js"></script>
    <script src="js/rbush.min.js"></script>
    <script src="js/labelgun.min.js"></script>
    <script src="js/labels.js"></script>
    <script src="data/Limite_Municipal_1.js"></script>
    <script src="data/RedesSIBBr_2.js"></script>
    <script src="data/Pontos_3.js"></script>
</body>
</html>
